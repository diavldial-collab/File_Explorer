name: Build EXE

# main 브랜치에 푸시될 때마다 자동으로 실행됩니다.
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest 

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 사용하는 파이썬 버전에 맞게 유지하세요.

    - name: 필요한 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: PyInstaller로 단일 exe 빌드
      # --onefile 옵션으로 단일 파일 생성, 파일명에 공백이 있어 따옴표("") 사용
      run: |
        pyinstaller --noconfirm --onefile --windowed "Advance_Explorer_V3g_20260323_9_WindowContext.py"

    - name: 빌드된 exe 파일 업로드
      uses: actions/upload-artifact@v4
      with:
        # 다운로드 받을 압축 파일의 이름을 깔끔하게 지정
        name: Advance_Explorer_EXE
        # dist 폴더 안의 exe 파일만 쏙 골라서 업로드
        path: dist/*.exe
